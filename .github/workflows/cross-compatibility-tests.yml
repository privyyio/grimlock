name: Cross-Compatibility Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "go/**"
      - "typescript/**"
      - "cross-compatibility-testing/**"
      - ".github/workflows/cross-compatibility-tests.yml"

jobs:
  cross-compatibility:
    name: Cross-Compatibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Make test script executable
        run: chmod +x cross-compatibility-testing/run-tests.sh

      - name: Get Playwright version
        id: playwright-version
        working-directory: typescript/grimlock
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: typescript/grimlock

      - name: Run cross-compatibility tests
        working-directory: cross-compatibility-testing
        run: ./run-tests.sh
