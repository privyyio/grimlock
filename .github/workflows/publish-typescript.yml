name: Publish TS Package

on:
  push:
    tags:
      - "typescript/v*"
    branches:
      - main
    paths:
      - "typescript/grimlock/**"
      - ".github/workflows/publish-typescript.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@privyy-io"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Extract version from tag (if tag push)
        if: startsWith(github.ref, 'refs/tags/typescript/')
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/typescript/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set package version
        id: package_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -n "${{ steps.tag_version.outputs.version }}" ]; then
            VERSION="${{ steps.tag_version.outputs.version }}"
          else
            # Extract base version from package.json
            BASE_VERSION=$(node -p "require('./typescript/grimlock/package.json').version")

            # Query npm registry for existing dev versions
            VERSIONS=$(curl -s "https://registry.npmjs.org/@privyy-io%2Fgrimlock" 2>/dev/null)

            # Find the highest dev number for this base version
            LATEST_DEV=$(echo "$VERSIONS" | node -e "
              try {
                const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
                const versions = Object.keys(data.versions || {});
                const devVersions = versions
                  .filter(v => v && v.startsWith('${BASE_VERSION}-dev.'))
                  .map(v => parseInt(v.split('-dev.')[1]))
                  .filter(n => !isNaN(n));
                console.log(devVersions.length > 0 ? Math.max(...devVersions) : 0);
              } catch (e) {
                console.log(0);
              }
            " 2>/dev/null || echo "0")

            # Increment the dev number
            DEV_NUMBER=$((LATEST_DEV + 1))
            VERSION="${BASE_VERSION}-dev.${DEV_NUMBER}"
            echo "Base version: ${BASE_VERSION}"
            echo "Latest dev number: ${LATEST_DEV}"
            echo "New version: ${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Setting version to: $VERSION"

      - name: Update package.json version and repository
        working-directory: ./typescript/grimlock
        run: |
          npm version "${{ steps.package_version.outputs.version }}" --no-git-tag-version
          # Ensure repository URL matches exactly
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.repository = {
              type: 'git',
              url: 'https://github.com/${{ github.repository }}.git',
              directory: 'typescript/grimlock'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        working-directory: ./typescript/grimlock
        run: npm ci

      - name: Build TypeScript
        working-directory: ./typescript/grimlock
        run: npm run build

      - name: Get Playwright version
        id: playwright-version
        working-directory: ./typescript/grimlock
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./typescript/grimlock
        run: npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: ./typescript/grimlock
        run: |
          echo "Running tests..."
          npm test

      - name: Publish to npm
        working-directory: ./typescript/grimlock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Package name: @privyy-io/grimlock"
          echo "Publishing to npm..."
          npm publish --access public
